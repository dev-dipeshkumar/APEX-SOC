<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" xml:space="preserve">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield Shape -->
  <path d="M256 32 L448 112 L448 272 C448 368 368 448 256 480 C144 448 64 368 64 272 L64 112 Z"
        fill="url(#shieldGrad)" stroke="#06b6d4" stroke-width="4" filter="url(#softGlow)"/>

  <!-- Inner Shield Border -->
  <path d="M256 56 L428 128 L428 268 C428 352 356 424 256 452 C156 424 84 352 84 268 L84 128 Z"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Inner Glow Effect -->
  <path d="M256 56 L428 128 L428 268 C428 352 356 424 256 452 C156 424 84 352 84 268 L84 128 Z"
        fill="url(#innerGlow)"/>

  <!-- Scan Lines (subtle) -->
  <clipPath id="shieldClip">
    <path d="M256 56 L428 128 L428 268 C428 352 356 424 256 452 C156 424 84 352 84 268 L84 128 Z"/>
  </clipPath>
  <g clip-path="url(#shieldClip)" opacity="0.06">
    <line x1="64" y1="160" x2="448" y2="160" stroke="white" stroke-width="1"/>
    <line x1="64" y1="200" x2="448" y2="200" stroke="white" stroke-width="1"/>
    <line x1="64" y1="240" x2="448" y2="240" stroke="white" stroke-width="1"/>
    <line x1="64" y1="280" x2="448" y2="280" stroke="white" stroke-width="1"/>
    <line x1="64" y1="320" x2="448" y2="320" stroke="white" stroke-width="1"/>
    <line x1="64" y1="360" x2="448" y2="360" stroke="white" stroke-width="1"/>
    <line x1="64" y1="400" x2="448" y2="400" stroke="white" stroke-width="1"/>
  </g>

  <!-- Letter "A" - stylized -->
  <g filter="url(#glow)">
    <!-- A outer shape -->
    <path d="M256 120 L320 280 L296 280 L280 236 L232 236 L216 280 L192 280 Z
             M244 216 L268 216 L256 168 Z"
          fill="white" opacity="0.95"/>
  </g>

  <!-- Crossbar accent line -->
  <line x1="220" y1="244" x2="292" y2="244" stroke="#06b6d4" stroke-width="4" filter="url(#glow)"/>

  <!-- Bottom accent - small shield element -->
  <g transform="translate(256, 340)" opacity="0.8">
    <!-- Small inner shield -->
    <path d="M0 -24 L20 -14 L20 8 C20 20 10 30 0 34 C-10 30 -20 20 -20 8 L-20 -14 Z"
          fill="none" stroke="#06b6d4" stroke-width="2" filter="url(#glow)"/>
    <!-- Lock icon inside -->
    <rect x="-8" y="-4" width="16" height="14" rx="2" fill="none" stroke="white" stroke-width="2"/>
    <path d="M-4 -4 L-4 -10 C-4 -16 4 -16 4 -10 L4 -4" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="4" r="2" fill="white"/>
  </g>

  <!-- Corner accent dots -->
  <circle cx="140" cy="160" r="3" fill="#06b6d4" opacity="0.5" filter="url(#glow)"/>
  <circle cx="372" cy="160" r="3" fill="#06b6d4" opacity="0.5" filter="url(#glow)"/>
  <circle cx="140" cy="380" r="3" fill="#3b82f6" opacity="0.3" filter="url(#glow)"/>
  <circle cx="372" cy="380" r="3" fill="#3b82f6" opacity="0.3" filter="url(#glow)"/>

  <!-- Top accent line -->
  <line x1="200" y1="98" x2="312" y2="98" stroke="rgba(6,182,212,0.4)" stroke-width="1.5"/>
</svg>